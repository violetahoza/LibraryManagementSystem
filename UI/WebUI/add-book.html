<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Book - Library Management System</title>
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Header */
        header {
            background-color: #1a75ff;
            color: white;
            padding: 1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        header h1 {
            font-size: 1.8rem;
            display: inline-block;
        }
        
        /* Navigation */
        nav {
            background-color: #f8f9fa;
            border-bottom: 1px solid #ddd;
        }
        
        nav ul {
            list-style: none;
            display: flex;
            padding: 0 1rem;
        }
        
        nav ul li {
            padding: 1rem;
        }
        
        nav ul li a {
            color: #495057;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }
        
        nav ul li a:hover {
            color: #1a75ff;
        }
        
        /* Main Content */
        main {
            padding: 2rem 0;
            min-height: calc(100vh - 160px);
        }
        
        section {
            margin-bottom: 2rem;
        }
        
        h2 {
            margin-bottom: 1rem;
            color: #343a40;
            border-bottom: 2px solid #1a75ff;
            padding-bottom: 0.5rem;
        }
        
        /* Form Styles */
        .form-container {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: #495057;
        }
        
        input[type="text"],
        input[type="number"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 1rem;
            color: #495057;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="email"]:focus,
        select:focus,
        textarea:focus {
            border-color: #1a75ff;
            outline: none;
            box-shadow: 0 0 0 0.2rem rgba(26, 117, 255, 0.25);
        }
        
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 1.5rem;
        }
        
        .form-col {
            flex: 1;
        }
        
        /* Required field indicator */
        .required-field::after {
            content: " *";
            color: #dc3545;
        }
        
        /* Buttons */
        .btn {
            display: inline-block;
            padding: 0.75rem 1rem;
            background-color: #1a75ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.3s;
            font-size: 1rem;
        }
        
        .btn:hover {
            background-color: #0056b3;
        }
        
        .btn-success {
            background-color: #28a745;
        }
        
        .btn-success:hover {
            background-color: #218838;
        }
        
        .btn-secondary {
            background-color: #6c757d;
        }
        
        .btn-secondary:hover {
            background-color: #5a6268;
        }
        
        .form-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
        }
        
        /* Header actions */
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        /* Alert messages */
        .alert {
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 4px;
            display: none;
        }
        
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-danger {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        /* Footer */
        footer {
            background-color: #343a40;
            color: #f8f9fa;
            padding: 1rem;
            text-align: center;
        }
        
        /* Responsive Design */
        @media (max-width: 768px) {
            nav ul {
                flex-direction: column;
            }
            
            nav ul li {
                padding: 0.5rem 1rem;
            }
            
            .header-actions {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .form-row {
                flex-direction: column;
                gap: 0;
            }
            
            .form-buttons {
                flex-direction: column;
                gap: 10px;
            }
            
            .btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>Library Management System</h1>
        </div>
    </header>
    
    <nav>
        <div class="container">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="books.html">Books</a></li>
                <li><a href="loans.html">Loans</a></li>
                <li><a href="search.html">Search</a></li>
                <li><a href="recommendations.html">Recommendations</a></li>
                <li><a href="notifications.html">Notifications</a></li>
            </ul>
        </div>
    </nav>
    
    <main>
        <div class="container">
            <div class="header-actions">
                <h2>Add New Book</h2>
                <a href="books.html" class="btn btn-secondary">← Back to Books</a>
            </div>
            
            <div class="alert alert-success" id="success-alert">
                Book added successfully!
            </div>
            
            <div class="alert alert-danger" id="error-alert">
                Error adding book. Please try again.
            </div>
            
            <div class="form-container">
                <form id="add-book-form">
                    <div class="form-row">
                        <div class="form-col">
                            <div class="form-group">
                                <label for="title" class="required-field">Title</label>
                                <input type="text" id="title" name="title" required>
                            </div>
                        </div>
                        <div class="form-col">
                            <div class="form-group">
                                <label for="author" class="required-field">Author</label>
                                <input type="text" id="author" name="author" required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-col">
                            <div class="form-group">
                                <label for="isbn">ISBN</label>
                                <input type="text" id="isbn" name="isbn">
                            </div>
                        </div>
                        <div class="form-col">
                            <div class="form-group">
                                <label for="publicationYear">Publication Year</label>
                                <input type="number" id="publicationYear" name="publicationYear" min="1000" max="2025">
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-col">
                            <div class="form-group">
                                <label for="publisher">Publisher</label>
                                <input type="text" id="publisher" name="publisher">
                            </div>
                        </div>
                        <div class="form-col">
                            <div class="form-group">
                                <label for="genre">Genre</label>
                                <select id="genre" name="genre">
                                    <option value="">-- Select Genre --</option>
                                    <option value="Fiction">Fiction</option>
                                    <option value="Non-Fiction">Non-Fiction</option>
                                    <option value="Science Fiction">Science Fiction</option>
                                    <option value="Fantasy">Fantasy</option>
                                    <option value="Mystery">Mystery</option>
                                    <option value="Thriller">Thriller</option>
                                    <option value="Romance">Romance</option>
                                    <option value="Biography">Biography</option>
                                    <option value="History">History</option>
                                    <option value="Self-Help">Self-Help</option>
                                    <option value="Business">Business</option>
                                    <option value="Science">Science</option>
                                    <option value="Technology">Technology</option>
                                    <option value="Classic">Classic</option>
                                    <option value="Poetry">Poetry</option>
                                    <option value="Children">Children</option>
                                    <option value="Young Adult">Young Adult</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-col">
                            <div class="form-group">
                                <label for="totalQuantity" class="required-field">Total Quantity</label>
                                <input type="number" id="totalQuantity" name="totalQuantity" min="1" value="1" required>
                            </div>
                        </div>
                        <div class="form-col">
                            <div class="form-group">
                                <label for="tags">Tags (comma separated)</label>
                                <input type="text" id="tags" name="tags" placeholder="Fiction, 20th Century, etc.">
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-buttons">
                        <button type="button" class="btn btn-secondary" onclick="window.location.href='books.html'">Cancel</button>
                        <button type="submit" class="btn btn-success">Add Book</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
    
    <footer>
        <div class="container">
            <p>&copy; 2025 - Library Management System - Siemens Internship Project</p>
        </div>
    </footer>

    <!-- Include the API client -->
    <script src="api.js"></script>
    
    <!-- Page-specific JavaScript -->
    <script>
        // Handle form submission
        document.getElementById('add-book-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Hide any existing alerts
            document.getElementById('success-alert').style.display = 'none';
            document.getElementById('error-alert').style.display = 'none';
            
            // Get form values
            const title = document.getElementById('title').value.trim();
            const author = document.getElementById('author').value.trim();
            const isbn = document.getElementById('isbn').value.trim();
            const publicationYearInput = document.getElementById('publicationYear').value.trim();
            const publisher = document.getElementById('publisher').value.trim();
            const genre = document.getElementById('genre').value;
            const totalQuantityInput = document.getElementById('totalQuantity').value.trim();
            const tagsInput = document.getElementById('tags').value.trim();
            
            // Validate required fields
            if (!title || !author || !totalQuantityInput) {
                document.getElementById('error-alert').textContent = 'Please fill in all required fields.';
                document.getElementById('error-alert').style.display = 'block';
                return;
            }
            
            // Parse numeric values
            const publicationYear = publicationYearInput ? parseInt(publicationYearInput) : null;
            const totalQuantity = parseInt(totalQuantityInput);
            
            // Parse tags
            const tags = tagsInput
                ? tagsInput.split(',').map(tag => tag.trim()).filter(tag => tag.length > 0)
                : [];
            
            // Create book object
            const bookData = {
                title,
                author,
                isbn: isbn || null,
                publicationYear,
                publisher: publisher || null,
                genre: genre || null,
                totalQuantity,
                availableQuantity: totalQuantity, // Initially all books are available
                tags,
                borrowCount: 0 // New book, no borrows yet
            };
            
            try {
                // Add the book
                const newBook = await BookAPI.addBook(bookData);
                
                // Show success message
                document.getElementById('success-alert').style.display = 'block';
                
                // Reset the form
                document.getElementById('add-book-form').reset();
                
                // Redirect to books page after a delay
                setTimeout(function() {
                    window.location.href = 'books.html';
                }, 2000);
            } catch (error) {
                console.error('Error adding book:', error);
                document.getElementById('error-alert').textContent = `Error adding book: ${error.message}`;
                document.getElementById('error-alert').style.display = 'block';
            }
        });
    </script>
</body>
</html>
