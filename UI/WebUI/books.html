<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books - Library Management System</title>
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Header */
        header {
            background-color: #1a75ff;
            color: white;
            padding: 1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        header h1 {
            font-size: 1.8rem;
            display: inline-block;
        }
        
        /* Navigation */
        nav {
            background-color: #f8f9fa;
            border-bottom: 1px solid #ddd;
        }
        
        nav ul {
            list-style: none;
            display: flex;
            padding: 0 1rem;
        }
        
        nav ul li {
            padding: 1rem;
        }
        
        nav ul li a {
            color: #495057;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }
        
        nav ul li a:hover {
            color: #1a75ff;
        }
        
        /* Main Content */
        main {
            padding: 2rem 0;
            min-height: calc(100vh - 160px);
        }
        
        section {
            margin-bottom: 2rem;
        }
        
        h2 {
            margin-bottom: 1rem;
            color: #343a40;
            border-bottom: 2px solid #1a75ff;
            padding-bottom: 0.5rem;
        }
        
        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        th, td {
            padding: 0.75rem;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }
        
        th {
            background-color: #f8f9fa;
            color: #495057;
            font-weight: bold;
        }
        
        tr:hover {
            background-color: #f8f9fa;
        }
        
        /* Buttons */
        .btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            background-color: #1a75ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.3s;
        }
        
        .btn:hover {
            background-color: #0056b3;
        }
        
        .btn-danger {
            background-color: #dc3545;
        }
        
        .btn-danger:hover {
            background-color: #bd2130;
        }
        
        .btn-success {
            background-color: #28a745;
        }
        
        .btn-success:hover {
            background-color: #218838;
        }
        
        .btn-sm {
            padding: 0.25rem 0.5rem;
            font-size: 0.875rem;
        }
        
        /* Badges */
        .badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            color: white;
        }
        
        .badge-success {
            background-color: #28a745;
        }
        
        .badge-danger {
            background-color: #dc3545;
        }
        
        /* Action buttons */
        .action-buttons {
            display: flex;
            gap: 5px;
        }
        
        /* Header actions */
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        /* Loading indicator */
        .loading {
            text-align: center;
            padding: 2rem;
            color: #6c757d;
        }
        
        /* Footer */
        footer {
            background-color: #343a40;
            color: #f8f9fa;
            padding: 1rem;
            text-align: center;
        }
        
        /* Responsive Design */
        @media (max-width: 768px) {
            nav ul {
                flex-direction: column;
            }
            
            nav ul li {
                padding: 0.5rem 1rem;
            }
            
            .header-actions {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            table {
                display: block;
                overflow-x: auto;
                white-space: nowrap;
            }
            
            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>Library Management System</h1>
        </div>
    </header>
    
    <nav>
        <div class="container">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="books.html">Books</a></li>
                <li><a href="loans.html">Loans</a></li>
                <li><a href="search.html">Search</a></li>
                <li><a href="recommendations.html">Recommendations</a></li>
                <li><a href="notifications.html">Notifications</a></li>
            </ul>
        </div>
    </nav>
    
    <main>
        <div class="container">
            <section>
                <div class="header-actions">
                    <h2>Books</h2>
                    <a href="add-book.html" class="btn btn-success">+ Add New Book</a>
                </div>
                
                <div id="loading" class="loading">
                    Loading books...
                </div>
                
                <table id="books-table" style="display: none;">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Author</th>
                            <th>Genre</th>
                            <th>Publication Year</th>
                            <th>Availability</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="books-list">
                        <!-- Books will be loaded dynamically -->
                    </tbody>
                </table>
            </section>
        </div>
    </main>
    
    <footer>
        <div class="container">
            <p>&copy; 2025 - Library Management System - Siemens Internship Project</p>
        </div>
    </footer>

    <!-- Include the API client -->
    <script src="api.js"></script>
    
    <!-- Page-specific JavaScript -->
    <script>
        // Load all books
        async function loadBooks() {
            try {
                const books = await BookAPI.getAllBooks();
                
                // Hide loading indicator and show table
                document.getElementById('loading').style.display = 'none';
                document.getElementById('books-table').style.display = 'table';
                
                const tableBody = document.getElementById('books-list');
                
                if (books.length === 0) {
                    // No books found
                    const row = document.createElement('tr');
                    row.innerHTML = '<td colspan="6" style="text-align: center;">No books found in the library.</td>';
                    tableBody.appendChild(row);
                    return;
                }
                
                // Create a row for each book
                books.forEach(book => {
                    const row = document.createElement('tr');
                    
                    row.innerHTML = `
                        <td>${book.title}</td>
                        <td>${book.author}</td>
                        <td>${book.genre || '-'}</td>
                        <td>${book.publicationYear || '-'}</td>
                        <td>
                            <span class="badge ${book.availableQuantity > 0 ? 'badge-success' : 'badge-danger'}">
                                ${book.availableQuantity}/${book.totalQuantity}
                            </span>
                        </td>
                        <td>
                            <div class="action-buttons">
                                <a href="book-details.html?id=${book.id}" class="btn btn-sm">Details</a>
                                <a href="edit-book.html?id=${book.id}" class="btn btn-sm">Edit</a>
                                ${book.availableQuantity > 0 
                                    ? `<a href="borrow-book.html?id=${book.id}" class="btn btn-sm btn-success">Borrow</a>`
                                    : `<a class="btn btn-sm" style="opacity: 0.5; cursor: not-allowed; background-color: #6c757d;">Unavailable</a>`
                                }
                            </div>
                        </td>
                    `;
                    
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error('Error loading books:', error);
                document.getElementById('loading').textContent = 'Error loading books. Please try again later.';
            }
        }
        
        // Call the function when the page loads
        document.addEventListener('DOMContentLoaded', loadBooks);
    </script>
</body>
</html>
